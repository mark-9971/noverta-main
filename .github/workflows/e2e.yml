name: E2E Tests

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright (e2e)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: trellis
          POSTGRES_PASSWORD: trellis
          POSTGRES_DB: trellis_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U trellis"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      # --- Postgres ---
      DATABASE_URL: postgres://trellis:trellis@localhost:5432/trellis_e2e
      PGSSLMODE: disable

      # --- Application ---
      NODE_ENV: test
      LOG_LEVEL: warn
      DEV_AUTH_BYPASS: "0"
      APP_BASE_URL: http://127.0.0.1:8080
      APP_ORIGIN: http://127.0.0.1:8080
      CORS_ALLOWED_ORIGINS: http://127.0.0.1:8080
      SESSION_SECRET: ci-e2e-session-secret-do-not-use-in-prod
      TRUST_PROXY: "1"

      # --- Clerk (must be set as repo secrets) ---
      CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}

      # --- Playwright / E2E ---
      E2E_BASE_URL: http://127.0.0.1:8080
      E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
      E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
      E2E_PROVISION_KEY: ci-e2e-provision-key

      # --- Proxy ---
      PROXY_PORT: "8080"
      API_TARGET: http://127.0.0.1:8090
      WEB_TARGET: http://127.0.0.1:5173

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Verify required secrets are present
        run: |
          missing=0
          for var in CLERK_PUBLISHABLE_KEY CLERK_SECRET_KEY E2E_ADMIN_EMAIL E2E_ADMIN_PASSWORD; do
            if [ -z "${!var}" ]; then
              echo "::error::Required secret $var is not set"
              missing=1
            fi
          done
          exit $missing

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace libraries
        run: pnpm run typecheck:libs

      - name: Push database schema
        run: pnpm --filter @workspace/db run push

      - name: Build API server
        run: pnpm --filter @workspace/api-server run build

      - name: Build Trellis web app
        run: pnpm --filter @workspace/trellis run build

      - name: Install Playwright browsers
        run: pnpm --filter @workspace/e2e exec playwright install --with-deps chromium

      - name: Start API server
        run: |
          PORT=8090 pnpm --filter @workspace/api-server run start \
            > /tmp/api-server.log 2>&1 &
          echo $! > /tmp/api-server.pid

      - name: Start Trellis web preview
        run: |
          PORT=5173 pnpm --filter @workspace/trellis run serve \
            > /tmp/trellis-web.log 2>&1 &
          echo $! > /tmp/trellis-web.pid

      - name: Start CI reverse proxy
        run: |
          node scripts/ci-proxy.mjs > /tmp/ci-proxy.log 2>&1 &
          echo $! > /tmp/ci-proxy.pid

      - name: Wait for services to be ready
        run: |
          set -e
          echo "Waiting for API server..."
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8090/api/health >/dev/null 2>&1 \
               || curl -fsS http://127.0.0.1:8090/health >/dev/null 2>&1; then
              echo "API server is up"; break
            fi
            sleep 2
            if [ "$i" = "60" ]; then
              echo "::error::API server did not become ready"
              tail -n 200 /tmp/api-server.log || true
              exit 1
            fi
          done

          echo "Waiting for web preview..."
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:5173/ >/dev/null 2>&1; then
              echo "Web preview is up"; break
            fi
            sleep 2
            if [ "$i" = "60" ]; then
              echo "::error::Web preview did not become ready"
              tail -n 200 /tmp/trellis-web.log || true
              exit 1
            fi
          done

          echo "Waiting for proxy..."
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/ >/dev/null 2>&1; then
              echo "Proxy is up"; break
            fi
            sleep 1
            if [ "$i" = "30" ]; then
              echo "::error::Proxy did not become ready"
              tail -n 200 /tmp/ci-proxy.log || true
              exit 1
            fi
          done

      - name: Run Playwright tests
        working-directory: e2e
        # Add the html reporter alongside the default `list` reporter so the
        # uploaded `playwright-report` artifact includes a browsable report.
        run: npx playwright test --reporter=list,html

      - name: Stop background services
        if: always()
        run: |
          for f in /tmp/api-server.pid /tmp/trellis-web.pid /tmp/ci-proxy.pid; do
            [ -f "$f" ] && kill "$(cat "$f")" 2>/dev/null || true
          done

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            e2e/playwright-report
            e2e/test-results
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload service logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: service-logs
          path: |
            /tmp/api-server.log
            /tmp/trellis-web.log
            /tmp/ci-proxy.log
          retention-days: 14
          if-no-files-found: ignore
