kind = "web"
previewPath = "/"
title = "MinuteOps"
version = "1.0.0"
id = "artifacts/minuteops"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22248

[services.development]
run = "pnpm --filter @workspace/minuteops run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/minuteops", "run", "build" ]
publicDir = "artifacts/minuteops/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22248"
BASE_PATH = "/"
