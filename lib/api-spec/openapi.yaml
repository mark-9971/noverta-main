    TodayScheduleBlock:
      type: object
      description: >
        One row of /schedules/today. Mirrors a subset of ScheduleBlock,
        plus a `status` enum that may now include "closed" or
        "early_release" when the school's calendar exception applies on
        the current date. `durationMinutes` is the EFFECTIVE duration
        for today: zero on closures and on post-dismissal blocks during
        an early-release day; reduced to the pre-dismissal portion on a
        block that straddles dismissal.
      properties:
        id:
          type: integer
        staffId:
          type: integer
        studentId:
          type: ["integer", "null"]
        studentName:
          type: ["string", "null"]
        serviceTypeId:
          type: ["integer", "null"]
        serviceTypeName:
          type: ["string", "null"]
        startTime:
          type: string
        endTime:
          type: string
        durationMinutes:
          type: integer
        location:
          type: ["string", "null"]
        blockLabel:
          type: ["string", "null"]
        sessionLogId:
          type: ["integer", "null"]
        status:
          type: string
          enum:
            - logged
            - in_progress
            - missed
            - upcoming
            - closed
            - early_release
        date:
          type: string
      required:
        - id
        - staffId
        - startTime
        - endTime
        - durationMinutes
        - status
        - date

