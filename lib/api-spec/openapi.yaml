      type: object
      description: >
        Day-level school-calendar exception that applies to the caller's
        primary school today, returned by /schedules/today/exception.
        Surfaced by the Today view as a banner so users can immediately
        see WHY their schedule blocks may be flipped to "closed" /
        "early_release".
      properties:
        type:
          type: string
          enum:
            - closure
            - early_release
        reason:
          type: ["string", "null"]
          description: Optional human-readable reason (e.g. "Snow day").
        dismissalTime:
          type: ["string", "null"]
          description: >
            For early_release days, the wall-clock dismissal time
            ("HH:MM" 24h). Null for closures.
        date:
          type: string
          description: ISO date (YYYY-MM-DD) the exception applies to.
      required: [type, date]

