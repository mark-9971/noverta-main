  # ─── Today (per-staff schedule for the current day) ──────────────
  /schedules/today:
    get:
      operationId: listMyTodaySchedule
      tags: [schedules]
      summary: Caller's schedule blocks for today, annotated with status
      description: >
        Returns the calling staff member's recurring schedule blocks for
        the current weekday, each annotated with a status field. The
        status reflects matched session logs ("logged"), wall-clock state
        ("in_progress" / "missed" / "upcoming"), and per-school calendar
        exceptions: a closure flips every block to "closed" with
        durationMinutes=0; an early-release day flips post-dismissal
        blocks to "closed" and the straddling block to "early_release"
        with durationMinutes prorated to the pre-dismissal portion.
      responses:
        "200":
          description: Today's schedule blocks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TodayScheduleBlock"

  /schedules/today/exception:
    get:
      operationId: getMyTodayScheduleException
      tags: [schedules]
      summary: Day-level school calendar exception (if any) for the caller's school today
      description: >
        Returns the school-calendar exception that applies to the caller's
        primary school on the current date, or `null` if none. Used by the
        Today view to render a day-level "School Closed" / "Early Release"
        banner without re-querying school_calendar_exceptions from the UI.
        Sibling of /schedules/today; kept separate so /schedules/today's
        flat-array contract is preserved.
      responses:
        "200":
          description: Today's exception (or null)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/TodayScheduleException"
                  - type: "null"

