      tags: [audit]
      summary: List audit logs (admin only)
      parameters:
        - name: page
          in: query
          schema:
            type: ["integer", "null"]
        - name: limit
          in: query
          schema:
            type: ["integer", "null"]
        - name: action
          in: query
          schema:
            type: ["string", "null"]
        - name: targetTable
          in: query
          schema:
            type: ["string", "null"]
        - name: actorUserId
          in: query
          schema:
            type: ["string", "null"]
        - name: studentId
          in: query
          schema:
            type: ["integer", "null"]
        - name: startDate
          in: query
          schema:
            type: ["string", "null"]
        - name: endDate
          in: query
          schema:
            type: ["string", "null"]
        - name: search
          in: query
          schema:
            type: ["string", "null"]
        # Filters audit rows by metadata->>'correlation_id'. The
        # supersede flow stamps both the old-row update and the new-row
        # create with the same correlationId so the student-detail history
        # view can deep-link straight to "what happened in this rewrite".
        - name: correlationId
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Paginated list of audit logs
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginationMeta"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/AuditLogEntry"

