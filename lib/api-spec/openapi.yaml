openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Trellis API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: students
    description: Student management
  - name: staff
    description: Staff management
  - name: services
    description: Service types and requirements
  - name: sessions
    description: Session logging
  - name: schedules
    description: Schedule management
  - name: alerts
    description: Compliance alerts
  - name: dashboard
    description: Dashboard summaries
  - name: imports
    description: Data import
  - name: districts
    description: District management
  - name: reports
    description: Reports

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── Dashboard ───────────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get home dashboard summary stats
      parameters:
        - name: schoolId
          in: query
          schema:
            type: ["integer", "null"]
        - name: districtId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/risk-overview:
    get:
      operationId: getDashboardRiskOverview
      tags: [dashboard]
      summary: Get risk overview by status
      parameters:
        - name: schoolId
          in: query
          schema:
            type: ["integer", "null"]
        - name: districtId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Risk overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskOverview"

  /dashboard/provider-summary:
    get:
      operationId: getProviderDashboardSummary
      tags: [dashboard]
      summary: Get provider dashboard summary
      parameters:
        - name: schoolId
          in: query
          schema:
            type: ["integer", "null"]
        - name: districtId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Provider dashboard
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProviderDashboardItem"

  /dashboard/para-summary:
    get:
      operationId: getParaDashboardSummary
      tags: [dashboard]
      summary: Get paraeducator dashboard summary
      parameters:
        - name: schoolId
          in: query
          schema:
            type: ["integer", "null"]
        - name: districtId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Para dashboard
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ParaDashboardItem"

  /dashboard/alerts-summary:
    get:
      operationId: getDashboardAlertsSummary
      tags: [dashboard]
      summary: Get count of open alerts by severity
      parameters:
        - name: schoolId
          in: query
          schema:
            type: ["integer", "null"]
        - name: districtId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Alerts summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertsSummary"

  /dashboard/compliance-by-service:
    get:
      operationId: getComplianceByService
      tags: [dashboard]
      summary: Get compliance rates grouped by service type
      parameters:
        - name: schoolId
          in: query
          schema:
            type: ["integer", "null"]
        - name: districtId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Compliance by service type
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ComplianceByService"

  /dashboard/missed-sessions-trend:
    get:
      operationId: getMissedSessionsTrend
      tags: [dashboard]
      summary: Get missed session counts over last 8 weeks
      parameters:
        - name: schoolId
          in: query
          schema:
            type: ["integer", "null"]
        - name: districtId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Missed sessions trend
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MissedSessionsTrendPoint"

  /dashboard/executive:
    get:
      operationId: getExecutiveDashboard
      tags: [dashboard]
      summary: Get principal executive dashboard summary
      parameters:
        - name: schoolId
          in: query
          schema:
            type: ["integer", "null"]
        - name: districtId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Executive dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutiveDashboard"

  /dashboard/staff-coverage:
    get:
      operationId: getStaffCoverage
      tags: [dashboard]
      summary: Get staff coverage by service type
      parameters:
        - name: schoolId
          in: query
          schema:
            type: ["integer", "null"]
        - name: districtId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Staff coverage
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffCoverageResponse"

  /dashboard/iep-calendar:
    get:
      operationId: getIepCalendar
      tags: [dashboard]
      summary: Get IEP calendar events with date filtering
      parameters:
        - name: startDate
          in: query
          schema:
            type: ["string", "null"]
        - name: endDate
          in: query
          schema:
            type: ["string", "null"]
        - name: eventType
          in: query
          schema:
            type: ["string", "null"]
        - name: schoolId
          in: query
          schema:
            type: ["integer", "null"]
        - name: districtId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: IEP calendar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IepCalendarResponse"

  # ─── Districts ────────────────────────────────────────────────────
  /districts:
    get:
      operationId: listDistricts
      tags: [districts]
      summary: List districts
      responses:
        "200":
          description: List of districts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DistrictSummary"
    post:
      operationId: createDistrict
      tags: [districts]
      summary: Create district
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDistrictBody"
      responses:
        "201":
          description: Created district
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/District"

  /districts/{id}:
    get:
      operationId: getDistrict
      tags: [districts]
      summary: Get district details with schools
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: District with schools
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DistrictDetail"
    patch:
      operationId: updateDistrict
      tags: [districts]
      summary: Update district
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDistrictBody"
      responses:
        "200":
          description: Updated district
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/District"
    delete:
      operationId: deleteDistrict
      tags: [districts]
      summary: Delete district
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required: [success]
        "409":
          description: Cannot delete - schools linked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /district-overview:
    get:
      operationId: getDistrictOverview
      tags: [districts]
      summary: District rollup with per-school compliance data
      parameters:
        - name: districtId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: District overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DistrictOverview"

  # ─── Schools & Programs ───────────────────────────────────────────
  /schools:
    get:
      operationId: listSchools
      tags: [students]
      summary: List schools
      responses:
        "200":
          description: List of schools
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/School"
    post:
      operationId: createSchool
      tags: [students]
      summary: Create school
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSchoolBody"
      responses:
        "201":
          description: Created school
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/School"

  /programs:
    get:
      operationId: listPrograms
      tags: [students]
      summary: List programs
      responses:
        "200":
          description: List of programs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Program"
    post:
      operationId: createProgram
      tags: [students]
      summary: Create program
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProgramBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Program"

  # ─── Students ────────────────────────────────────────────────────
  /students:
    get:
      operationId: listStudents
      tags: [students]
      summary: List students with optional filters
      parameters:
        - name: status
          in: query
          schema:
            type: ["string", "null"]
        - name: programId
          in: query
          schema:
            type: ["integer", "null"]
        - name: schoolId
          in: query
          schema:
            type: ["integer", "null"]
        - name: districtId
          in: query
          schema:
            type: ["integer", "null"]
        - name: caseManagerId
          in: query
          schema:
            type: ["integer", "null"]
        - name: riskStatus
          in: query
          schema:
            type: ["string", "null"]
        - name: grade
          in: query
          schema:
            type: ["string", "null"]
        - name: search
          in: query
          schema:
            type: ["string", "null"]
        - name: limit
          in: query
          schema:
            type: ["integer", "null"]
        - name: offset
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: List of students
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StudentSummary"
    post:
      operationId: createStudent
      tags: [students]
      summary: Create student
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStudentBody"
      responses:
        "201":
          description: Created student
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"

  /students/{id}:
    get:
      operationId: getStudent
      tags: [students]
      summary: Get student detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Student detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateStudent
      tags: [students]
      summary: Update student
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStudentBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"

  /students/{id}/minute-progress:
    get:
      operationId: getStudentMinuteProgress
      tags: [students]
      summary: Get minute progress for all service requirements of a student
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Minute progress list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MinuteProgress"

  /students/{id}/sessions:
    get:
      operationId: getStudentSessions
      tags: [students]
      summary: Get recent sessions for a student
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Sessions list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SessionLog"

  /students/{id}/alerts:
    get:
      operationId: getStudentAlerts
      tags: [students]
      summary: Get active alerts for a student
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Alerts list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"

  # ─── Staff ───────────────────────────────────────────────────────
  /staff:
    get:
      operationId: listStaff
      tags: [staff]
      summary: List all staff
      parameters:
        - name: role
          in: query
          schema:
            type: ["string", "null"]
        - name: status
          in: query
          schema:
            type: ["string", "null"]
        - name: schoolId
          in: query
          schema:
            type: ["integer", "null"]
        - name: districtId
          in: query
          schema:
            type: ["integer", "null"]
        - name: limit
          in: query
          schema:
            type: ["integer", "null"]
        - name: offset
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Staff list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Staff"
    post:
      operationId: createStaff
      tags: [staff]
      summary: Create staff member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStaffBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Staff"

  /staff/{id}:
    get:
      operationId: getStaff
      tags: [staff]
      summary: Get staff detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Staff detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffDetail"
    patch:
      operationId: updateStaff
      tags: [staff]
      summary: Update staff
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStaffBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Staff"

  /staff/{id}/caseload:
    get:
      operationId: getStaffCaseload
      tags: [staff]
      summary: Get caseload and minute progress for a provider
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Caseload
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MinuteProgress"

  # ─── Service Types ────────────────────────────────────────────────
  /service-types:
    get:
      operationId: listServiceTypes
      tags: [services]
      summary: List service types
      responses:
        "200":
          description: Service types
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ServiceType"
    post:
      operationId: createServiceType
      tags: [services]
      summary: Create service type
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateServiceTypeBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceType"

  # ─── Service Requirements ─────────────────────────────────────────
  /service-requirements:
    get:
      operationId: listServiceRequirements
      tags: [services]
      summary: List service requirements
      parameters:
        - name: studentId
          in: query
          schema:
            type: ["integer", "null"]
        - name: serviceTypeId
          in: query
          schema:
            type: ["integer", "null"]
        - name: providerId
          in: query
          schema:
            type: ["integer", "null"]
        - name: active
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Requirements list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ServiceRequirement"
    post:
      operationId: createServiceRequirement
      tags: [services]
      summary: Create service requirement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateServiceRequirementBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceRequirement"

  /service-requirements/{id}:
    get:
      operationId: getServiceRequirement
      tags: [services]
      summary: Get service requirement
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Service requirement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceRequirement"
    patch:
      operationId: updateServiceRequirement
      tags: [services]
      summary: Update service requirement
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateServiceRequirementBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceRequirement"
    delete:
      operationId: deleteServiceRequirement
      tags: [services]
      summary: Delete service requirement
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Session Logs ────────────────────────────────────────────────
  /sessions:
    get:
      operationId: listSessions
      tags: [sessions]
      summary: List session logs
      parameters:
        - name: studentId
          in: query
          schema:
            type: ["integer", "null"]
        - name: staffId
          in: query
          schema:
            type: ["integer", "null"]
        - name: serviceRequirementId
          in: query
          schema:
            type: ["integer", "null"]
        - name: status
          in: query
          schema:
            type: ["string", "null"]
        - name: dateFrom
          in: query
          schema:
            type: ["string", "null"]
        - name: dateTo
          in: query
          schema:
            type: ["string", "null"]
        - name: schoolId
          in: query
          schema:
            type: ["integer", "null"]
        - name: districtId
          in: query
          schema:
            type: ["integer", "null"]
        - name: limit
          in: query
          schema:
            type: ["integer", "null"]
        - name: offset
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SessionLog"
    post:
      operationId: createSession
      tags: [sessions]
      summary: Log a session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionLog"

  /sessions/{id}:
    get:
      operationId: getSession
      tags: [sessions]
      summary: Get session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionLog"
    patch:
      operationId: updateSession
      tags: [sessions]
      summary: Update session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSessionBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionLog"
    delete:
      operationId: deleteSession
      tags: [sessions]
      summary: Delete session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /sessions/bulk:
    post:
      operationId: bulkCreateSessions
      tags: [sessions]
      summary: Bulk log sessions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkCreateSessionsBody"
      responses:
        "201":
          description: Created sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SessionLog"

  # ─── Minute Progress ─────────────────────────────────────────────
  /minute-progress:
    get:
      operationId: listMinuteProgress
      tags: [services]
      summary: List minute progress for all active service requirements
      parameters:
        - name: studentId
          in: query
          schema:
            type: ["integer", "null"]
        - name: staffId
          in: query
          schema:
            type: ["integer", "null"]
        - name: riskStatus
          in: query
          schema:
            type: ["string", "null"]
        - name: serviceTypeId
          in: query
          schema:
            type: ["integer", "null"]
        - name: programId
          in: query
          schema:
            type: ["integer", "null"]
        - name: schoolId
          in: query
          schema:
            type: ["integer", "null"]
        - name: districtId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Minute progress
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MinuteProgress"

  # ─── Schedule Blocks ─────────────────────────────────────────────
  /schedule-blocks:
    get:
      operationId: listScheduleBlocks
      tags: [schedules]
      summary: List schedule blocks
      parameters:
        - name: staffId
          in: query
          schema:
            type: ["integer", "null"]
        - name: studentId
          in: query
          schema:
            type: ["integer", "null"]
