components:
  schemas:
    PaginationMeta:
      type: object
      required: [total, page, pageSize, hasMore]
      properties:
        total:
          type: integer
          description: Total number of records matching the query
        page:
          type: integer
          description: Current page number (1-indexed)
        pageSize:
          type: integer
          description: Number of records per page
        hasMore:
          type: boolean
          description: Whether more records are available beyond this page
    AuditLogEntry:
      type: object
      required: [id, action, createdAt]
      properties:
        id:
          type: integer
        actorUserId:
          type: ["string", "null"]
        action:
          type: string
        targetTable:
          type: ["string", "null"]
        targetId:
          type: ["string", "null"]
        studentId:
          type: ["integer", "null"]
        summary:
          type: ["string", "null"]
        metadata:
          type: ["object", "null"]
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    # ─── Schools & Programs ───────────────────────────────────────
    School:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        district:
          type: ["string", "null"]
        districtId:
          type: ["integer", "null"]
        createdAt:
          type: string
      required: [id, name, createdAt]

    CreateSchoolBody:
      type: object
      properties:
        name:
          type: string
        district:
          type: ["string", "null"]
        districtId:
          type: ["integer", "null"]
      required: [name]

    SchoolCalendarException:
      type: object
      description: A per-school day-level exception to the default instructional calendar.
      properties:
        id:
          type: integer
        schoolId:
          type: integer
        exceptionDate:
          type: string
          description: ISO date (YYYY-MM-DD)
        type:
          type: string
          enum: [closure, early_release]
        dismissalTime:
          type: ["string", "null"]
          description: HH:MM (24h). Required when type=early_release, must be null when type=closure.
        reason:
          type: string
        notes:
          type: ["string", "null"]
        createdBy:
          type: ["integer", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, schoolId, exceptionDate, type, reason, createdAt, updatedAt]

    CreateSchoolCalendarExceptionBody:
      type: object
      properties:
        exceptionDate:
          type: string
        type:
          type: string
          enum: [closure, early_release]
        dismissalTime:
          type: ["string", "null"]
        reason:
          type: string
        notes:
          type: ["string", "null"]
      required: [exceptionDate, type, reason]

    UpdateSchoolCalendarExceptionBody:
      type: object
      properties:
        exceptionDate:
          type: string
        type:
          type: string
          enum: [closure, early_release]
        dismissalTime:
          type: ["string", "null"]
        reason:
          type: string
        notes:
          type: ["string", "null"]

    Program:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        schoolId:
          type: integer
        description:
          type: ["string", "null"]
        createdAt:
          type: string
      required: [id, name, schoolId, createdAt]

    CreateProgramBody:
      type: object
      properties:
        name:
          type: string
        schoolId:
          type: integer
        description:
          type: ["string", "null"]
      required: [name, schoolId]

    # ─── Students ─────────────────────────────────────────────────
    AntecedentStrategyItem:
      type: object
      properties:
        id:
          type: string
        category:
          type: string
        description:
          type: string
        implementedBy:
          type: ["string", "null"]
        setting:
          type: ["string", "null"]
      required: [id, category, description]

    TeachingStrategyItem:
      type: object
      properties:
        id:
          type: string
        skill:
          type: string
        method:
          type: string
        replacementFor:
          type: ["string", "null"]
        promptingStrategy:
          type: ["string", "null"]
        materials:
          type: ["string", "null"]
      required: [id, skill, method]

    ConsequenceProcedureItem:
      type: object
      properties:
        id:
          type: string
        targetBehavior:
          type: string
        triggerLevel:
          type: string
        procedure:
          type: string
        responsibleStaff:
          type: ["string", "null"]
        avoidResponse:
          type: ["string", "null"]
      required: [id, targetBehavior, triggerLevel, procedure]

    ReinforcementItem:
      type: object
      properties:
        id:
          type: string
        reinforcer:
          type: string
        reinforcerType:
          type: string
        schedule:
          type: string
        scheduleDetail:
          type: ["string", "null"]
        deliveredBy:
          type: ["string", "null"]
        thinningPlan:
          type: ["string", "null"]
      required: [id, reinforcer, reinforcerType, schedule]

    CrisisSupportItem:
      type: object
      properties:
        id:
          type: string
        phase:
          type: string
        procedure:
          type: string
        staffRole:
          type: ["string", "null"]
        contactNotify:
          type: ["string", "null"]
        deescalationTips:
          type: ["string", "null"]
        physicalProcedureInvolved:
          type: ["boolean", "null"]
      required: [id, phase, procedure]

    BehaviorTargetItem:
      type: object
      properties:
        id:
          type: integer
        studentId:
          type: integer
        name:
          type: string
        description:
          type: string
        measurementType:
          type: string
        targetDirection:
          type: string
        baselineValue:
          type: ["string", "null"]
        goalValue:
          type: ["string", "null"]
        active:
          type: boolean
        trackingMethod:
          type: ["string", "null"]
        intervalLengthSeconds:
          type: ["integer", "null"]
        intervalMode:
          type: ["string", "null"]
        enableHourlyTracking:
          type: ["boolean", "null"]
      required: [id, studentId, name, description, measurementType, targetDirection, active]

    ProgramTargetItem:
      type: object
      properties:
        id:
          type: integer
        studentId:
          type: integer
        name:
          type: string
        description:
          type: string
        programType:
          type: string
        targetCriterion:
          type: string
        domain:
          type: string
        active:
          type: boolean
        phase:
          type: ["string", "null"]
        phaseChangedAt:
          type: ["string", "null"]
        promptHierarchy:
          type: ["array", "null"]
          items:
            type: string
        currentPromptLevel:
          type: ["string", "null"]
        currentStep:
          type: ["integer", "null"]
        autoProgressEnabled:
          type: ["boolean", "null"]
        masteryCriterionPercent:
          type: ["number", "null"]
        masteryCriterionSessions:
          type: ["integer", "null"]
        regressionThreshold:
          type: ["number", "null"]
        regressionSessions:
          type: ["integer", "null"]
        reinforcementSchedule:
          type: ["string", "null"]
        reinforcementType:
          type: ["string", "null"]
        tutorInstructions:
          type: ["string", "null"]
        templateId:
          type: ["integer", "null"]
      required: [id, studentId, name, description, programType, targetCriterion, domain, active]

    ProgramStepItem:
      type: object
      properties:
        id:
          type: integer
        programTargetId:
          type: integer
        stepNumber:
          type: integer
        name:
          type: string
        sdInstruction:
          type: ["string", "null"]
        targetResponse:
          type: ["string", "null"]
        materials:
          type: ["string", "null"]
        promptStrategy:
          type: ["string", "null"]
        errorCorrection:
          type: ["string", "null"]
        reinforcementNotes:
          type: ["string", "null"]
        active:
          type: boolean
        mastered:
          type: boolean
      required: [id, programTargetId, stepNumber, name, active, mastered]

    ProgramTemplateItem:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        category:
          type: string
        programType:
          type: string
        domain:
          type: string
        isGlobal:
          type: boolean
        promptHierarchy:
          type: array
          items:
            type: string
        defaultMasteryPercent:
          type: number
        defaultMasterySessions:
          type: integer
        tutorInstructions:
          type: string
        steps:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              sdInstruction:
                type: ["string", "null"]
              targetResponse:
                type: ["string", "null"]
              materials:
                type: ["string", "null"]
            required: [name]
      required: [id, name, description, category, programType, domain, isGlobal, promptHierarchy, defaultMasteryPercent, defaultMasterySessions, tutorInstructions, steps]

    DataSessionItem:
      type: object
      properties:
        id:
          type: integer
        studentId:
          type: integer
        sessionDate:
          type: string
        staffName:
          type: ["string", "null"]
        startTime:
          type: string
        endTime:
          type: string
      required: [id, studentId, sessionDate, startTime, endTime]

    TrendPoint:
      type: object
      properties:
        sessionDate:
          type: string
        value:
          type: ["string", "null"]
        targetName:
          type: ["string", "null"]
        measurementType:
          type: ["string", "null"]
        behaviorTargetId:
          type: ["integer", "null"]
        programTargetId:
          type: ["integer", "null"]
        trialsCorrect:
          type: ["integer", "null"]
        trialsTotal:
          type: ["integer", "null"]
        percentCorrect:
          type: ["string", "null"]
        promptLevelUsed:
          type: ["string", "null"]
        hourBlock:
          type: ["string", "null"]
        prompted:
          type: ["integer", "null"]
      required: [sessionDate]

    SpedStudentListItem:
      type: object
      properties:
        id:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        grade:
          type: ["string", "null"]
        schoolId:
          type: ["integer", "null"]
        placementType:
          type: ["string", "null"]
        status:
          type: ["string", "null"]
      required: [id, firstName, lastName]

    StudentSummary:
      type: object
      properties:
        id:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        externalId:
          type: ["string", "null"]
        grade:
          type: ["string", "null"]
        placementType:
          type: ["string", "null"]
        status:
          type: string
        schoolId:
          type: ["integer", "null"]
        programId:
          type: ["integer", "null"]
        schoolName:
          type: ["string", "null"]
        programName:
          type: ["string", "null"]
        caseManagerId:
          type: ["integer", "null"]
        caseManagerName:
          type: ["string", "null"]
        enrolledAt:
          type: ["string", "null"]
        withdrawnAt:
          type: ["string", "null"]
        riskStatus:
          type: ["string", "null"]
        activeRequirementsCount:
          type: integer
        onTrackCount:
          type: integer
        atRiskCount:
          type: integer
        behindCount:
          type: integer
      required: [id, firstName, lastName, status, activeRequirementsCount, onTrackCount, atRiskCount, behindCount]

    Student:
      type: object
      properties:
        id:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        externalId:
          type: ["string", "null"]
        grade:
          type: ["string", "null"]
        placementType:
          type: ["string", "null"]
        status:
          type: string
        schoolId:
          type: ["integer", "null"]
        programId:
          type: ["integer", "null"]
        caseManagerId:
          type: ["integer", "null"]
        notes:
          type: ["string", "null"]
        tags:
          type: ["string", "null"]
        medicaidId:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, firstName, lastName, status, createdAt, updatedAt]

    StudentDetail:
      type: object
      properties:
        id:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        externalId:
          type: ["string", "null"]
        grade:
          type: ["string", "null"]
        placementType:
          type: ["string", "null"]
        status:
          type: string
        schoolId:
          type: ["integer", "null"]
        programId:
          type: ["integer", "null"]
        caseManagerId:
          type: ["integer", "null"]
        notes:
          type: ["string", "null"]
        tags:
          type: ["string", "null"]
        medicaidId:
          type: ["string", "null"]
        enrolledAt:
          type: ["string", "null"]
        withdrawnAt:
          type: ["string", "null"]
        schoolName:
          type: ["string", "null"]
        programName:
          type: ["string", "null"]
        caseManagerName:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
        serviceRequirements:
          type: array
          items:
            $ref: "#/components/schemas/ServiceRequirement"
        minuteProgress:
          type: array
          items:
            $ref: "#/components/schemas/MinuteProgress"
        recentSessions:
          type: array
          items:
            $ref: "#/components/schemas/SessionLog"
        activeAlerts:
          type: array
          items:
            $ref: "#/components/schemas/Alert"
        assignedStaff:
          type: array
          items:
            $ref: "#/components/schemas/StaffAssignment"
      required: [id, firstName, lastName, status, createdAt, updatedAt, serviceRequirements, minuteProgress, recentSessions, activeAlerts, assignedStaff]

    CreateStudentBody:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        externalId:
          type: ["string", "null"]
        grade:
          type: ["string", "null"]
        placementType:
          type: ["string", "null"]
        status:
          type: string
        schoolId:
          type: ["integer", "null"]
        programId:
          type: ["integer", "null"]
        caseManagerId:
          type: ["integer", "null"]
        notes:
          type: ["string", "null"]
        tags:
          type: ["string", "null"]
        dateOfBirth:
          type: ["string", "null"]
      required: [firstName, lastName, status]

    UpdateStudentBody:
      type: object
      properties:
        firstName:
          type: ["string", "null"]
        lastName:
          type: ["string", "null"]
        externalId:
          type: ["string", "null"]
        grade:
          type: ["string", "null"]
        placementType:
          type: ["string", "null"]
        status:
          type: ["string", "null"]
        schoolId:
          type: ["integer", "null"]
        programId:
          type: ["integer", "null"]
        caseManagerId:
          type: ["integer", "null"]
        notes:
          type: ["string", "null"]
        tags:
          type: ["string", "null"]
        medicaidId:
          type: ["string", "null"]

    # ─── Staff ────────────────────────────────────────────────────
    Staff:
      type: object
      properties:
        id:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: ["string", "null"]
        role:
          type: string
        title:
          type: ["string", "null"]
        schoolId:
          type: ["integer", "null"]
        status:
          type: string
        qualifications:
          type: ["string", "null"]
        hourlyRate:
          type: ["string", "null"]
        annualSalary:
          type: ["string", "null"]
        npiNumber:
          type: ["string", "null"]
        medicaidProviderId:
          type: ["string", "null"]
        createdAt:
          type: string
      required: [id, firstName, lastName, role, status, createdAt]

    StaffDetail:
      type: object
      properties:
        id:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: ["string", "null"]
        role:
          type: string
        title:
          type: ["string", "null"]
        schoolId:
          type: ["integer", "null"]
        status:
          type: string
        qualifications:
          type: ["string", "null"]
        hourlyRate:
          type: ["string", "null"]
        annualSalary:
          type: ["string", "null"]
        createdAt:
          type: string
        assignedStudents:
          type: array
          items:
            $ref: "#/components/schemas/StaffAssignment"
        scheduleBlocks:
          type: array
          items:
            $ref: "#/components/schemas/ScheduleBlock"
      required: [id, firstName, lastName, role, status, createdAt, assignedStudents, scheduleBlocks]

    CreateStaffBody:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: ["string", "null"]
        role:
          type: string
        title:
          type: ["string", "null"]
        schoolId:
          type: ["integer", "null"]
        status:
          type: string
        qualifications:
          type: ["string", "null"]
      required: [firstName, lastName, role, status]

    UpdateStaffBody:
      type: object
      properties:
        firstName:
          type: ["string", "null"]
        lastName:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        role:
          type: ["string", "null"]
        title:
          type: ["string", "null"]
        schoolId:
          type: ["integer", "null"]
        status:
          type: ["string", "null"]
        qualifications:
          type: ["string", "null"]
        npiNumber:
          type: ["string", "null"]
        medicaidProviderId:
          type: ["string", "null"]
        receiveRiskAlerts:
          type: ["boolean", "null"]
        alertDigestMode:
          type: ["boolean", "null"]

    # ─── Service Types ────────────────────────────────────────────
    ServiceType:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          type: string
        color:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        defaultIntervalType:
          type: ["string", "null"]
        createdAt:
          type: string
      required: [id, name, category, createdAt]

    CreateServiceTypeBody:
      type: object
      properties:
        name:
          type: string
        category:
          type: string
        color:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        defaultIntervalType:
          type: ["string", "null"]
      required: [name, category]

    # ─── Service Requirements ─────────────────────────────────────
    ServiceRequirement:
      type: object
      properties:
        id:
          type: integer
        studentId:
          type: integer
        serviceTypeId:
          type: integer
        serviceTypeName:
          type: ["string", "null"]
        providerId:
          type: ["integer", "null"]
        providerName:
          type: ["string", "null"]
        deliveryType:
          type: string
        requiredMinutes:
          type: integer
        intervalType:
          type: string
        startDate:
          type: string
        endDate:
          type: ["string", "null"]
        priority:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        active:
          type: boolean
        # Batch 1 (Service Requirement v1) — operational denormalization.
        # Canonical school for a requirement remains students.school_id.
        schoolId:
          type: ["integer", "null"]
        # "individual" | "group" — derived from legacy groupSize.
        deliveryModel:
          type: ["string", "null"]
        # Set by the (separate) supersede flow. Always null today.
        supersedesId:
          type: ["integer", "null"]
        replacedAt:
          type: ["string", "null"]
        # Service Requirement v1 — populated by the periodized read paths
        # (asOfDate / range modes on the list endpoint, dashboard reads,
        # iep-suggestions). 'active' = live tail of the supersede chain;
        # 'superseded' = a past row in the chain or an end-dated row
        # with no successor. Null on legacy raw-list reads that have not
        # been migrated.
        source:
          type: ["string", "null"]
          enum: ["active", "superseded", null]
        createdAt:
          type: string
      required: [id, studentId, serviceTypeId, deliveryType, requiredMinutes, intervalType, startDate, active, createdAt]

    CreateServiceRequirementBody:
      type: object
      properties:
        studentId:
          type: integer
        serviceTypeId:
          type: integer
        providerId:
          type: ["integer", "null"]
        deliveryType:
          type: string
        requiredMinutes:
          type: integer
        intervalType:
          type: string
        startDate:
          type: string
        endDate:
          type: ["string", "null"]
        priority:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        active:
          type: boolean
        schoolId:
          type: ["integer", "null"]
        deliveryModel:
          type: ["string", "null"]
        supersedesId:
          type: ["integer", "null"]
        replacedAt:
          type: ["string", "null"]
      required: [studentId, serviceTypeId, deliveryType, requiredMinutes, intervalType, startDate, active]

    UpdateServiceRequirementBody:
      type: object
      properties:
        providerId:
          type: ["integer", "null"]
        deliveryType:
          type: ["string", "null"]
        requiredMinutes:
          type: ["integer", "null"]
        intervalType:
          type: ["string", "null"]
        startDate:
          type: ["string", "null"]
        endDate:
          type: ["string", "null"]
        priority:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        active:
          type: ["boolean", "null"]
        schoolId:
          type: ["integer", "null"]
        deliveryModel:
          type: ["string", "null"]
        supersedesId:
          type: ["integer", "null"]
        replacedAt:
          type: ["string", "null"]
        # Service Requirement v1: serviceTypeId / setting / groupSize are
        # patchable on uncredited rows (mostly used by the import-fix flow);
        # on credited rows the supersede guard rejects any change.
        serviceTypeId:
          type: ["integer", "null"]
        setting:
          type: ["string", "null"]
        groupSize:
          type: ["string", "null"]

    # Returned in the 409 body when PATCH /service-requirements/:id touches a
    # material field on a row that already has credited sessions. Clients
    # should re-issue the same payload against
    # POST /service-requirements/:id/supersede.
    RequiresSupersedeError:
      type: object
      properties:
        error:
          type: string
        code:
          type: string
        requires_supersede:
          type: boolean
        credited_session_count:
          type: integer
      required: [error, code, requires_supersede, credited_session_count]

    SupersedeServiceRequirementBody:
      type: object
      properties:
        # The day the new row takes effect. The old row is end-dated to
        # supersedeDate − 1 day. Required.
        supersedeDate:
          type: string
        # All other fields are optional patches against the new row;
        # anything omitted is inherited from the old row.
        # Identity fields (studentId, schoolId) are ALWAYS inherited
        # from the old row and cannot be overridden — supersede is for
        # rewriting a requirement, not relocating it to another student
        # or school. Cross-district moves require a separate flow.
        serviceTypeId:
          type: ["integer", "null"]
        providerId:
          type: ["integer", "null"]
        deliveryType:
          type: ["string", "null"]
        requiredMinutes:
          type: ["integer", "null"]
        intervalType:
          type: ["string", "null"]
        endDate:
          type: ["string", "null"]
        priority:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        active:
          type: ["boolean", "null"]
        deliveryModel:
          type: ["string", "null"]
        setting:
          type: ["string", "null"]
        groupSize:
          type: ["string", "null"]
      # supersedeDate is OPTIONAL on the wire — when omitted, the server
      # defaults it to today (UTC). Clients still typically supply it.

    SupersedeServiceRequirementResponse:
      type: object
      properties:
        old:
          $ref: "#/components/schemas/ServiceRequirement"
        new:
          $ref: "#/components/schemas/ServiceRequirement"
      required: [old, new]

    # One link in a service requirement's supersede chain. Returned (in
    # root → newest order) by GET /service-requirements/{id}/chain to power
    # the student-detail history view.
    ServiceRequirementChainEntry:
      type: object
      properties:
        requirement:
          $ref: "#/components/schemas/ServiceRequirement"
        # supersedeCorrelationId / supersededByActorUserId are present for
        # every chain entry except the root (which was an original create,
        # not a supersede). They identify the audit rows the supersede
        # transaction wrote so the UI can deep-link to them.
        supersedeCorrelationId:
          type: ["string", "null"]
        supersededByActorUserId:
          type: ["string", "null"]
        supersededByActorRole:
          type: ["string", "null"]
        # ISO-8601 timestamp of the supersede transaction, sourced from
        # the create-audit row's createdAt. Null on the root.
        supersededAt:
          type: ["string", "null"]
        # Material fields whose value differs from the prior entry in the
        # chain. Empty array on the root entry.
        changedFields:
          type: array
          items:
            type: string
      required: [requirement, changedFields]

